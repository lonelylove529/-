<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>業務核心主控台</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --accent: #0a84ff;
            --accent-dark: #0066cc;
            --danger: #ff453a;
            --success: #32d74b;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            padding: 15px; 
            margin: 0; 
            color: var(--text-main); 
        }

        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.3); 
            margin-bottom: 16px; 
        }

        h2 { margin: 0 0 15px 0; color: #fff; font-size: 18px; border-left: 4px solid var(--accent); padding-left: 10px; }

        .form-group { margin-bottom: 15px; }
        label { font-size: 13px; color: var(--text-sub); margin-bottom: 6px; display: block; }
        select, input, textarea { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            background: #2c2c2e; color: #fff; font-size: 16px;
        }

        /* 立體按鈕效果 */
        .action-btn { 
            width: 100%; background: var(--accent); color: white; border: none; padding: 16px; 
            border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 12px rgba(10, 132, 255, 0.3);
        }
        .action-btn:active { transform: scale(0.97); background: var(--accent-dark); }

        .select-group { display: flex; gap: 8px; }
        .radio-btn { 
            flex: 1; padding: 12px; background: #2c2c2e; border-radius: 10px; 
            text-align: center; font-size: 14px; font-weight: bold; cursor: pointer;
            transition: 0.2s;
        }
        .radio-btn.active { background: var(--accent); color: white; }

        /* 表格與狀態 */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; font-size: 13px; }
        td { padding: 12px; background: #2c2c2e; color: #eee; }
        td:first-child { border-radius: 12px 0 0 12px; }
        td:last-child { border-radius: 0 12px 12px 0; }
        
        .status-badge { 
            border: none; padding: 6px 12px; border-radius: 20px; font-size: 11px; 
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .status-not { background: #3d2525; color: var(--danger); }
        .status-done { background: #1c3327; color: var(--success); }

        .filter-btn { padding: 8px 12px; background: #2c2c2e; color: var(--text-sub); border: none; border-radius: 8px; margin-right: 5px; font-size: 12px; }
        .filter-btn.active { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2>業務出貨登記</h2>
    <div id="loading" style="text-align: center; color: var(--text-sub);">同步中...</div>
    <form id="orderForm" style="display: none;">
        <div class="form-group">
            <label>醫生姓名</label>
            <select id="doctor" required></select>
        </div>
        <div class="form-group">
            <label>產品名稱</label>
            <select id="product" required></select>
        </div>
        <div class="form-group">
            <label>尺寸規格</label>
            <div class="select-group" id="sizeGroup">
                <div class="radio-btn active" data-value="不分">不分</div>
                <div class="radio-btn" data-value="S">S</div>
                <div class="radio-btn" data-value="M">M</div>
                <div class="radio-btn" data-value="L">L</div>
            </div>
            <input type="hidden" id="selectedSize" value="不分">
        </div>
        <div class="form-group">
            <label>數量</label>
            <input type="number" id="quantity" value="1" min="1" required>
        </div>
        <button type="submit" id="submitBtn" class="action-btn">確認送出</button>
    </form>
</div>

<div class="card" id="historySection" style="display: none;">
    <h2>歷史看板</h2>
    <div class="filter-group" style="margin-bottom: 10px;">
        <button type="button" class="filter-btn active" id="f-all" onclick="setFilter('all')">全部</button>
        <button type="button" class="filter-btn" id="f-not" onclick="setFilter('未補貨')">未補貨</button>
        <button type="button" class="filter-btn" id="f-done" onclick="setFilter('已補貨')">已補貨</button>
    </div>
    <div class="table-container">
        <table>
            <tbody id="historyTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // 你的原有邏輯保持不變，只加入按鈕互動效果
    const GAS_URL = "https://script.google.com/macros/s/AKfycby0wPItvfeyTwsUBUOSv0XSvzWore2NOT9w4gaRsNPnoRCVpomOpsA-TQldLT8B_a1Bqw/exec";
    let globalData = { orders: [], doctors: [], products: [] };
    let currentStatusFilter = 'all';

    // 快捷鍵選取與視覺切換
    document.querySelectorAll('.radio-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            this.parentElement.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('selectedSize').value = this.getAttribute('data-value');
        });
    });

    window.onload = init;
    function init() {
        fetch(GAS_URL).then(res => res.json()).then(data => {
            globalData = data;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('orderForm').style.display = 'block';
            document.getElementById('historySection').style.display = 'block';
            
            // 填選單
            const docSelect = document.getElementById('doctor');
            globalData.doctors.forEach(d => docSelect.innerHTML += `<option value="${d}">${d}</option>`);
            globalData.products.forEach(p => document.getElementById('product').innerHTML += `<option value="${p}">${p}</option>`);
            filterOrders();
        });
    }

    function setFilter(status) {
        currentStatusFilter = status;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`f-${status === 'all' ? 'all' : (status === '未補貨' ? 'not' : 'done')}`).classList.add('active');
        filterOrders();
    }

    function filterOrders() {
        const tbody = document.getElementById('historyTableBody');
        tbody.innerHTML = "";
        globalData.orders.filter(o => currentStatusFilter === 'all' || o.status === currentStatusFilter).forEach(o => {
            const isDone = o.status === "已補貨";
            tbody.innerHTML += `
                <tr>
                    <td>${o.date.slice(5,10)}</td>
                    <td>${o.doctor}<br><small style="color:var(--text-sub)">${o.product}</small></td>
                    <td>
                        <button class="status-badge ${isDone ? 'status-done' : 'status-not'}" 
                                onclick="toggleStatus(${o.rowNum}, '${isDone ? '未補貨' : '已補貨'}')">
                            ${o.status}
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    function toggleStatus(rowNum, nextStatus) {
        const order = globalData.orders.find(o => o.rowNum === rowNum);
        if(order) { order.status = nextStatus; filterOrders(); }
        fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "toggleStatus", rowNum, newStatus: nextStatus }) });
    }

    document.getElementById('orderForm').onsubmit = (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "傳輸中...";
        const data = { action: "addOrder", doctor: document.getElementById('doctor').value, product: document.getElementById('product').value, quantity: document.getElementById('quantity').value, note: document.getElementById('selectedSize').value };
        fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) }).then(() => location.reload());
    };
</script>
</body>
</html>
