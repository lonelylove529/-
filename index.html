<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>業務核心主控台(高速完全體)</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; padding: 10px; margin: 0; color: #333; }
        .card { background: white; padding: 14px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); max-width: 100%; margin: 0 auto 12px auto; }
        h2 { margin-top: 0; color: #111; text-align: center; font-size: 17px; border-bottom: 2px solid #f0f2f5; padding-bottom: 6px; margin-bottom: 10px; }
        h3 { font-size: 13px; margin-top: 10px; color: #555; margin-bottom: 4px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #444; font-size: 13px; }
        select, input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #fafafa; }
        
        /* 選擇大按鈕 */
        .select-group { display: flex; gap: 4px; flex-wrap: wrap; }
        .radio-btn { flex: 1; min-width: 50px; text-align: center; padding: 10px 5px; background: #eee; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; border: 2px solid transparent; transition: 0.1s; }
        .radio-btn.active { background: #007aff; color: white; border-color: #0056b3; }
        
        /* 送出大按鈕 */
        .action-btn { width: 100%; background: #007aff; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .action-btn:disabled { background: #ccc; cursor: not-allowed; }
        
        /* 清單管理 */
        .list-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 6px 10px; border-radius: 6px; margin-bottom: 4px; font-size: 13px; }
        .del-btn { background: #ff3b30; color: white; border: none; padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
        .inline-form { display: flex; gap: 6px; margin-bottom: 8px; }
        .inline-form input { flex: 1; padding: 6px; font-size: 13px; }
        .inline-form button { padding: 6px 12px; background: #34c759; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; }

        /* 高速輕量化表格排版（手機順暢不卡頓） */
        .table-container { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; text-align: left; }
        th, td { padding: 8px 6px; border-bottom: 1px solid #eee; white-space: nowrap; }
        th { background: #f4f4f4; font-weight: bold; }
        .td-note { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; color: #666; }
        
        /* 狀態切換小標籤 */
        .status-badge { border: none; padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .status-not { background: #ffebeb; color: #ff3b30; border: 1px solid #ffbcbc; }
        .status-done { background: #e6f9ec; color: #34c759; border: 1px solid #a3e7b9; }
    </style>
</head>
<body>

<div class="card">
    <h2>📦 業務出貨登記系統</h2>
    <div id="loading" style="text-align: center; color: #888; padding: 10px; font-size: 13px;">正在同步雲端資料庫...</div>
    
    <form id="orderForm" style="display: none;">
        <div class="form-group">
            <label>醫生姓名</label>
            <select id="doctor" required></select>
        </div>

        <div class="form-group">
            <label>產品名稱</label>
            <select id="product" required></select>
        </div>

        <div class="form-group">
            <label>尺寸規格</label>
            <div class="select-group" id="sizeGroup">
                <div class="radio-btn active" data-value="不分">不分</div>
                <div class="radio-btn" data-value="S">S</div>
                <div class="radio-btn" data-value="M">M</div>
                <div class="radio-btn" data-value="L">L</div>
                <div class="radio-btn" data-value="XL">XL</div>
            </div>
            <input type="hidden" id="selectedSize" value="不分">
        </div>

        <div class="form-group">
            <label>肢側</label>
            <div class="select-group" id="sideGroup">
                <div class="radio-btn active" data-value="不分">不分</div>
                <div class="radio-btn" data-value="左">左</div>
                <div class="radio-btn" data-value="右">右</div>
            </div>
            <input type="hidden" id="selectedSide" value="不分">
        </div>

        <div class="form-group">
            <label>數量</label>
            <input type="number" id="quantity" value="1" min="1" required>
        </div>

        <div class="form-group">
            <label>備註 (特殊客製需求填這裡)</label>
            <textarea id="note" rows="2" placeholder="有尺寸與肢側外的特殊需求再填寫..."></textarea>
        </div>

        <button type="submit" id="submitBtn" class="action-btn">確認送出紀錄</button>
    </form>
</div>

<div class="card" id="historySection" style="display: none;">
    <h2>📊 歷史出貨即時看板 (橫滑可看全貌)</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>時間</th>
                    <th>醫生</th>
                    <th>產品</th>
                    <th>量</th>
                    <th>規格備註</th>
                    <th>狀態</th>
                </tr>
            </thead>
            <tbody id="historyTableBody"></tbody>
        </table>
    </div>
</div>

<div class="card" id="mgmtSection" style="display: none;">
    <h2>🛠️ 雲端名單管理面板</h2>
    
    <h3>👨‍⚕️ 醫生名單管理</h3>
    <div class="inline-form">
        <input type="text" id="newDocName" placeholder="輸入新醫生姓名">
        <button type="button" onclick="addList('Doctor')">新增</button>
    </div>
    <div id="doctorMgmtList"></div>

    <h3>🦿 產品名單管理</h3>
    <div class="inline-form">
        <input type="text" id="newProdName" placeholder="輸入新產品名稱">
        <button type="button" onclick="addList('Product')">新增</button>
    </div>
    <div id="productMgmtList"></div>
</div>

<script>
    // 這裡已自動綁定你最新的部署網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycby0wPItvfeyTwsUBUOSv0XSvzWore2NOT9w4gaRsNPnoRCVpomOpsA-TQldLT8B_a1Bqw/exec";
    let globalData = {};

    // 尺寸按鈕點選切換邏輯
    const sizeBtns = document.querySelectorAll('#sizeGroup .radio-btn');
    sizeBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            sizeBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('selectedSize').value = this.getAttribute('data-value');
        });
    });

    // 肢側按鈕點選切換邏輯
    const sideBtns = document.querySelectorAll('#sideGroup .radio-btn');
    sideBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            sideBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('selectedSide').value = this.getAttribute('data-value');
        });
    });

    window.onload = init;
    
    function init() {
        document.getElementById('loading').style.display = 'block';
        fetch(GAS_URL)
        .then(res => res.json())
        .then(data => {
            globalData = data;
            renderAll();
        })
        .catch(err => {
            document.getElementById('loading').innerHTML = "❌ 連線失敗，請檢查後台部署或網路。";
        });
    }

    function renderAll() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('orderForm').style.display = 'block';
        document.getElementById('mgmtSection').style.display = 'block';
        document.getElementById('historySection').style.display = 'block';

        // 1. 選單渲染
        const docSelect = document.getElementById('doctor');
        const prodSelect = document.getElementById('product');
        docSelect.innerHTML = ""; prodSelect.innerHTML = "";
        globalData.doctors.forEach(d => docSelect.innerHTML += `<option value="${d}">${d}</option>`);
        globalData.products.forEach(p => prodSelect.innerHTML += `<option value="${p}">${p}</option>`);

        // 2. 名單管理後台渲染
        const docMgmt = document.getElementById('doctorMgmtList');
        const prodMgmt = document.getElementById('productMgmtList');
        docMgmt.innerHTML = ""; prodMgmt.innerHTML = "";
        globalData.doctors.forEach(d => {
            docMgmt.innerHTML += `<div class="list-item"><span>${d}</span><button type="button" class="del-btn" onclick="deleteItem('Doctor', '${d}')">刪除</button></div>`;
        });
        globalData.products.forEach(p => {
            prodMgmt.innerHTML += `<div class="list-item"><span>${p}</span><button type="button" class="del-btn" onclick="deleteItem('Product', '${p}')">刪除</button></div>`;
        });

        // 3. 高速橫向滑動表格渲染
        const tbody = document.getElementById('historyTableBody');
        tbody.innerHTML = "";
        if(!globalData.orders || globalData.orders.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#888;">暫無紀錄</td></tr>`;
            return;
        }
        globalData.orders.forEach(o => {
            const isDone = o.status === "已補貨";
            const btnClass = isDone ? "status-done" : "status-not";
            const nextStatus = isDone ? "未補貨" : "已補貨";
            
            tbody.innerHTML += `
                <tr>
                    <td>${o.date}</td>
                    <td><strong>${o.doctor}</strong></td>
                    <td>${o.product}</td>
                    <td>${o.qty}</td>
                    <td><div class="td-note" title="${o.note || ''}">${o.note || '-'}</div></td>
                    <td>
                        <button type="button" class="status-badge ${btnClass}" onclick="toggleStatus(${o.rowNum}, '${nextStatus}')">
                            ${o.status}
                        </button>
                    </td>
                </tr>
            `;
        });
    }

    // 處理出貨表單送出
    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerHTML = "正在傳輸...";

        const sz = document.getElementById('selectedSize').value;
        const sd = document.getElementById('selectedSide').value;
        const userNote = document.getElementById('note').value.trim();
        
        // 如果選「不分」，就不會塞進備註文字，保持試算表乾淨
        let specArr = [];
        if (sz !== "不分") specArr.push(sz);
        if (sd !== "不分") specArr.push(sd);
        
        let prefix = specArr.length > 0 ? `【${specArr.join(' / ')}】` : "";
        const combinedNote = `${prefix}${userNote}`;

        const formData = {
            action: "addOrder",
            doctor: document.getElementById('doctor').value,
            product: document.getElementById('product').value,
            quantity: document.getElementById('quantity').value,
            note: combinedNote
        };

        sendPost(formData, "🎉 出貨紀錄已成功同步！", function() {
            document.getElementById('note').value = "";
            resetRadioButtons();
            btn.disabled = false; btn.innerHTML = "確認送出紀錄";
        });
    });

    // 恢復預設按鈕狀態
    function resetRadioButtons() {
        sizeBtns.forEach(b => b.classList.remove('active'));
        sideBtns.forEach(b => b.classList.remove('active'));
        sizeBtns[0].classList.add('active');
        sideBtns[0].classList.add('active');
        document.getElementById('selectedSize').value = "不分";
        document.getElementById('selectedSide').value = "不分";
    }

    function toggleStatus(rowNum, nextStatus) {
        const formData = { action: "toggleStatus", rowNum: rowNum, newStatus: nextStatus };
        sendPost(formData, `🔄 狀態已變更為【${nextStatus}】`, function(){});
    }

    function addList(type) {
        const input = document.getElementById(`new${type}Name`);
        const val = input.value.trim();
        if(!val) return alert("請輸入名稱");
        const data = { action: `add${type}`, name: val };
        input.value = "";
        sendPost(data, "🎉 成功新增名單！", function(){});
    }

    function deleteItem(type, name) {
        if(!confirm(`確定要刪除【${name}】嗎？`)) return;
        const data = { action: `delete${type}`, name: name };
        sendPost(data, "🗑️ 已自雲端移除", function(){});
    }

    function sendPost(data, successMsg, callback) {
        fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) })
        .then(res => res.json())
        .then(res => {
            if(res.status === "success") {
                alert(successMsg);
                if(callback) callback();
                init();
            } else { alert("❌ 處理失敗"); if(callback) callback(); }
        })
        .catch(err => { alert("❌ 連線超時，請重試"); if(callback) callback(); });
    }
</script>
</body>
</html>
