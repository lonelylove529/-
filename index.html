<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>業務核心主控台</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3596/3596080.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3596/3596080.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="業務主控台">

    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --text-main: #ffffff; --text-sub: #a0a0a0; --accent: #0a84ff; --danger: #ff453a; --success: #32d74b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg-color); padding: 15px; margin: 0; color: var(--text-main); -webkit-font-smoothing: antialiased; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); margin-bottom: 16px; }
        h2 { margin: 0 0 15px 0; color: #fff; font-size: 18px; border-left: 4px solid var(--accent); padding-left: 10px; }
        .form-group { margin-bottom: 15px; }
        label { font-size: 13px; color: var(--text-sub); margin-bottom: 6px; display: block; }
        select, input, textarea { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #2c2c2e; color: #fff; font-size: 16px; box-sizing: border-box; }
        .action-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.1s; }
        .action-btn:active { transform: scale(0.97); }
        .select-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .radio-btn { flex: 1; min-width: 50px; padding: 12px; background: #2c2c2e; border-radius: 10px; text-align: center; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .radio-btn.active { background: var(--accent); color: white; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 12px; background: #2c2c2e; vertical-align: top; }
        .status-badge { border: none; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .s-not { background: #3d2525; color: var(--danger); }
        .s-done { background: #1c3327; color: var(--success); }
        .filter-btn { padding: 8px 12px; background: #2c2c2e; color: var(--text-sub); border: none; border-radius: 8px; margin-right: 5px; font-size: 12px; }
        .filter-btn.active { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2>業務出貨登記</h2>
    <form id="orderForm">
        <div class="form-group"><label>醫生姓名</label><select id="doctor" required><option value="">-- 請選擇 --</option></select></div>
        <div class="form-group"><label>產品名稱</label><select id="product" required><option value="">-- 請選擇 --</option></select></div>
        <div class="form-group">
            <label>尺寸規格</label>
            <div class="select-group" id="sizeGroup">
                <div class="radio-btn active" data-value="不分">不分</div>
                <div class="radio-btn" data-value="S">S</div>
                <div class="radio-btn" data-value="M">M</div>
                <div class="radio-btn" data-value="L">L</div>
                <div class="radio-btn" data-value="XL">XL</div>
            </div>
            <input type="hidden" id="selectedSize" value="不分">
        </div>
        <div class="form-group">
            <label>肢側</label>
            <div class="select-group" id="sideGroup">
                <div class="radio-btn active" data-value="不分">不分</div>
                <div class="radio-btn" data-value="左">左</div>
                <div class="radio-btn" data-value="右">右</div>
            </div>
            <input type="hidden" id="selectedSide" value="不分">
        </div>
        <div class="form-group"><label>數量</label><input type="number" id="qty" value="1" min="1" required></div>
        <div class="form-group">
            <label style="color:var(--accent); cursor:pointer;" onclick="document.getElementById('noteContainer').style.display='block'">＋ 填寫特殊客製備註</label>
            <div id="noteContainer" style="display:none;"><textarea id="note" placeholder="輸入備註..."></textarea></div>
        </div>
        <button type="submit" id="submitBtn" class="action-btn">確認送出登記</button>
    </form>
</div>

<div class="card" id="historySection">
    <h2>歷史看板</h2>
    <input type="text" id="searchInput" oninput="render()" placeholder="🔍 搜尋醫生、產品..." style="margin-bottom: 10px;">
    <div style="margin-bottom: 10px;">
        <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
        <button class="filter-btn" onclick="setFilter('未補貨', this)">未補貨</button>
        <button class="filter-btn" onclick="setFilter('已補貨', this)">已補貨</button>
    </div>
    <table><tbody id="tbody"></tbody></table>
</div>

<script>
    // 你的邏輯部分保持不變
    const GAS_URL = "https://script.google.com/macros/s/AKfycby0wPItvfeyTwsUBUOSv0XSvzWore2NOT9w4gaRsNPnoRCVpomOpsA-TQldLT8B_a1Bqw/exec";
    let orders = [], filter = 'all';

    document.querySelectorAll('.radio-btn').forEach(btn => btn.onclick = function() {
        this.parentElement.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.getElementById(this.parentElement.id === 'sizeGroup' ? 'selectedSize' : 'selectedSide').value = this.dataset.value;
    });

    window.onload = () => {
        fetch(GAS_URL).then(res => res.json()).then(d => {
            orders = d.orders;
            d.doctors.forEach(v => document.getElementById('doctor').innerHTML += `<option value="${v}">${v}</option>`);
            d.products.forEach(v => document.getElementById('product').innerHTML += `<option value="${v}">${v}</option>`);
            render();
        });
    };

    function setFilter(f, btn) { filter = f; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); }

    function render() {
        const key = document.getElementById('searchInput').value.toLowerCase();
        document.getElementById('tbody').innerHTML = orders.filter(o => (filter === 'all' || o.status === filter) && (o.doctor.toLowerCase().includes(key) || o.product.toLowerCase().includes(key))).map(o => `
            <tr>
                <td style="font-size:12px;">
                    <div style="color:var(--text-main); font-weight:bold;">${o.date.split(' ')[0]}</div>
                    <div style="color:var(--text-sub);">${o.date.split(' ')[1] || ''}</div>
                </td>
                <td>
                    <div style="color:var(--text-main); font-weight:bold;">${o.doctor}</div>
                    <div style="color:var(--text-sub); font-size:12px;">${o.product} (${o.note || ''})</div>
                </td>
                <td style="text-align:right;">
                    <button class="status-badge ${o.status === '已補貨' ? 's-done' : 's-not'}" onclick="toggle(${o.rowNum})">${o.status}</button>
                </td>
            </tr>
        `).join('');
    }

    function toggle(row) { fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "toggle", row: row }) }).then(() => location.reload()); }

    document.getElementById('orderForm').onsubmit = (e) => {
        e.preventDefault();
        const data = { action: "add", doctor: document.getElementById('doctor').value, product: document.getElementById('product').value, qty: document.getElementById('qty').value, note: `${document.getElementById('selectedSize').value}/${document.getElementById('selectedSide').value} | ${document.getElementById('note').value}` };
        fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) }).then(() => location.reload());
    };
</script>
</body>
</html>
