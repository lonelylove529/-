<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>業務核心主控台 (補貨/出帳版)</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; padding: 10px; margin: 0; color: #333; }
        .card { background: white; padding: 14px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); margin-bottom: 12px; }
        h2 { margin: 0 0 10px 0; font-size: 16px; border-bottom: 2px solid #f0f2f5; padding-bottom: 6px; }
        .form-group { margin-bottom: 10px; }
        label { font-weight: bold; font-size: 13px; color: #555; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-top: 4px; background: #fafafa; }
        .action-btn { width: 100%; padding: 12px; background: #007aff; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 15px; }
        
        /* 狀態標籤 */
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; cursor: pointer; border: none; }
        .s-pending { background: #fff3cd; color: #856404; } /* 待入帳 */
        .s-in { background: #d4edda; color: #155724; }      /* 已入庫 */
        .s-done { background: #e2e3e5; color: #383d41; }    /* 已結算 */
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 10px 5px; border-bottom: 1px solid #eee; }
        .filter-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .filter-btn { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px; background: #fff; font-size: 12px; }
        .filter-btn.active { background: #333; color: white; }
    </style>
</head>
<body>

<div class="card">
    <h2>📦 業務登記 (補貨/出帳)</h2>
    <form id="orderForm">
        <div class="form-group">
            <label>醫生 / 補貨</label>
            <select id="doctor">
                <option value="【補貨】系統入庫">【✦ 系統入庫 (補貨)】</option>
            </select>
        </div>
        <div class="form-group">
            <label>產品名稱</label>
            <select id="product"></select>
        </div>
        <div class="form-group">
            <label>數量</label>
            <input type="number" id="qty" value="1" min="1" required>
        </div>
        <button type="submit" class="action-btn">確認送出</button>
    </form>
</div>

<div class="card">
    <h2>📊 歷史紀錄看板</h2>
    <div class="filter-group">
        <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
        <button class="filter-btn" onclick="setFilter('待入帳', this)">待入帳</button>
        <button class="filter-btn" onclick="setFilter('已入庫', this)">補貨紀錄</button>
    </div>
    <table>
        <thead><tr><th>時間</th><th>對象</th><th>產品</th><th>狀態</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby0wPItvfeyTwsUBUOSv0XSvzWore2NOT9w4gaRsNPnoRCVpomOpsA-TQldLT8B_a1Bqw/exec";
    let dataList = [];
    let currentFilter = 'all';

    window.onload = () => {
        fetch(GAS_URL).then(res => res.json()).then(d => {
            dataList = d.orders;
            const doc = document.getElementById('doctor');
            d.doctors.forEach(v => doc.innerHTML += `<option value="${v}">${v}</option>`);
            document.getElementById('product').innerHTML = d.products.map(v => `<option value="${v}">${v}</option>`).join('');
            render();
        });
    };

    function render() {
        document.getElementById('tbody').innerHTML = dataList.filter(o => currentFilter === 'all' || o.status === currentFilter).map(o => `
            <tr>
                <td>${o.date.slice(5, 10)}</td>
                <td>${o.doctor}</td>
                <td>${o.product}</td>
                <td><button class="status-badge ${o.status === '待入帳' ? 's-pending' : (o.status === '已入庫' ? 's-in' : 's-done')}" 
                    onclick="toggleStatus(${o.rowNum})">${o.status}</button></td>
            </tr>
        `).join('');
    }

    function setFilter(f, btn) {
        currentFilter = f;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function toggleStatus(row) {
        fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "toggle", row: row }) }).then(() => location.reload());
    }

    document.getElementById('orderForm').onsubmit = (e) => {
        e.preventDefault();
        const data = { action: "add", doctor: document.getElementById('doctor').value, product: document.getElementById('product').value, qty: document.getElementById('qty').value };
        fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) }).then(() => location.reload());
    };
</script>
</body>
</html>
