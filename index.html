<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>每週對帳中心</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 10px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { font-size: 16px; margin: 0 0 10px 0; color: #333; }
        select, input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; }
        .btn-send { width: 100%; padding: 12px; background: #007aff; color: white; border: none; border-radius: 8px; font-weight: bold; }
        .btn-copy { width: 100%; padding: 10px; background: #34c759; color: white; border: none; border-radius: 8px; font-size: 13px; margin-bottom: 10px; }
        table { width: 100%; font-size: 12px; border-collapse: collapse; }
        th, td { padding: 8px 4px; border-bottom: 1px solid #eee; text-align: left; }
        .status { padding: 4px 8px; border-radius: 12px; font-size: 10px; cursor: pointer; }
        .not-paid { background: #fee; color: #d00; }
        .paid { background: #efe; color: #080; }
    </style>
</head>
<body>

<div class="card">
    <h2>📦 出貨紀錄登記</h2>
    <form id="form">
        <select id="doctor" required><option value="">-- 請選擇醫生 --</option></select>
        <select id="product" required><option value="">-- 請選擇產品 --</option></select>
        <input type="number" id="qty" value="1" min="1" placeholder="數量">
        <button type="submit" class="btn-send">確認出貨</button>
    </form>
</div>

<div class="card">
    <h2>📊 本週未對帳清單</h2>
    <button class="btn-copy" onclick="copyList()">📋 一鍵複製傳 LINE 給助理/公司</button>
    <table>
        <thead><tr><th>時間</th><th>醫生</th><th>產品</th><th>狀態</th></tr></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby0wPItvfeyTwsUBUOSv0XSvzWore2NOT9w4gaRsNPnoRCVpomOpsA-TQldLT8B_a1Bqw/exec";
    let orders = [];

    window.onload = () => {
        fetch(GAS_URL).then(res => res.json()).then(data => {
            orders = data.orders;
            const docSel = document.getElementById('doctor');
            const prodSel = document.getElementById('product');
            data.doctors.forEach(d => docSel.innerHTML += `<option value="${d}">${d}</option>`);
            data.products.forEach(p => prodSel.innerHTML += `<option value="${p}">${p}</option>`);
            render();
        });
    };

    function render() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = orders.map(o => `
            <tr>
                <td>${o.date.split(' ')[0]}</td>
                <td>${o.doctor}</td>
                <td>${o.product}</td>
                <td><span class="status ${o.status === '已入帳' ? 'paid' : 'not-paid'}" onclick="toggleStatus(${o.rowNum})">${o.status}</span></td>
            </tr>
        `).join('');
    }

    function toggleStatus(row) {
        fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "toggle", row: row }) }).then(() => {
            alert("狀態已更新");
            location.reload();
        });
    }

    function copyList() {
        const list = orders.filter(o => o.status !== '已入帳');
        let text = "【本週待入帳清單】\n" + list.map(o => `${o.doctor}: ${o.product} x${o.qty}`).join('\n');
        navigator.clipboard.writeText(text).then(() => alert("已複製！"));
    }

    document.getElementById('form').onsubmit = (e) => {
        e.preventDefault();
        const data = { action: "add", doctor: document.getElementById('doctor').value, product: document.getElementById('product').value, qty: document.getElementById('qty').value };
        fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) }).then(() => location.reload());
    };
</script>
</body>
</html>
