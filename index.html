<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>業務主控台</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2921/2921225.png">
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --primary: #5d737e; --text: #3d3d3d; --sub: #888888; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; margin: 0; color: var(--text); }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h2 { font-size: 15px; color: var(--primary); margin: 0 0 12px 0; border-left: 4px solid var(--primary); padding-left: 10px; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 10px; background: #fafafa; margin-bottom: 10px; box-sizing: border-box; }
        .radio-group { display: flex; gap: 5px; margin-bottom: 10px; }
        .btn-radio { flex: 1; padding: 10px; background: #f0f0f0; text-align: center; border-radius: 8px; font-size: 13px; cursor: pointer; }
        .btn-radio.active { background: var(--primary); color: white; }
        .btn-main { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 5px; border-bottom: 1px solid #eee; }
        .tag { padding: 4px 10px; border-radius: 15px; font-size: 11px; cursor: pointer; }
        .tag-not { background: #fce4e4; color: #cc7a7a; }
        .tag-done { background: #e8f5e9; color: #7aab7a; }
        .filter-area { display: flex; gap: 5px; margin-bottom: 10px; }
        .filter-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--primary); color: var(--primary); font-size: 12px; }
        .filter-btn.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="card">
    <div style="text-align:center; margin-bottom:10px;">今日總出貨：<b id="dailyTotal" style="color:var(--primary);">0 件</b></div>
    <form id="orderForm">
        <select id="doctor" required><option value="">請選擇醫生</option></select>
        <select id="product" required><option value="">請選擇產品</option></select>
        
        <label style="font-size: 12px;">尺寸</label>
        <div class="radio-group" id="sizeGroup">
            <div class="btn-radio active" data-v="不分">不分</div><div class="btn-radio" data-v="S">S</div><div class="btn-radio" data-v="M">M</div><div class="btn-radio" data-v="L">L</div>
        </div>
        <input type="hidden" id="sz" value="不分">
        
        <label style="font-size: 12px;">肢側</label>
        <div class="radio-group" id="sideGroup">
            <div class="btn-radio active" data-v="不分">不分</div><div class="btn-radio" data-v="左">左</div><div class="btn-radio" data-v="右">右</div>
        </div>
        <input type="hidden" id="sd" value="不分">
        
        <label id="noteLabel" style="font-size: 12px; color:var(--primary); cursor:pointer;" onclick="toggleNote()">＋ 填寫客製備註</label>
        <textarea id="noteBox" style="display:none;" placeholder="在此輸入特殊備註..."></textarea>
        
        <input type="number" id="qty" value="1" placeholder="數量">
        <button type="submit" class="btn-main">確認送出</button>
    </form>
</div>

<div class="card">
    <h2>歷史看板</h2>
    <input type="text" id="searchInput" oninput="render()" placeholder="🔍 搜尋醫生/產品...">
    <div class="filter-area">
        <button class="filter-btn active" onclick="setFilter('all', this)">全部</button>
        <button class="filter-btn" onclick="setFilter('未補貨', this)">未補貨</button>
        <button class="filter-btn" onclick="setFilter('已補貨', this)">已補貨</button>
    </div>
    <table><tbody id="tbody"></tbody></table>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycby0wPItvfeyTwsUBUOSv0XSvzWore2NOT9w4gaRsNPnoRCVpomOpsA-TQldLT8B_a1Bqw/exec";
    let orders = [], filter = 'all';

    document.querySelectorAll('.btn-radio').forEach(btn => btn.onclick = function() {
        this.parentElement.querySelectorAll('.btn-radio').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.getElementById(this.parentElement.id === 'sizeGroup' ? 'sz' : 'sd').value = this.dataset.v;
    });

    window.onload = () => {
        fetch(GAS_URL).then(r => r.json()).then(d => {
            orders = d.orders;
            d.doctors.forEach(v => document.getElementById('doctor').innerHTML += `<option value="${v}">${v}</option>`);
            d.products.forEach(v => document.getElementById('product').innerHTML += `<option value="${v}">${v}</option>`);
            render();
        });
    };

    // 新增：控制備註欄位展開與收起的邏輯
    function toggleNote() {
        const box = document.getElementById('noteBox');
        const label = document.getElementById('noteLabel');
        if (box.style.display === 'none' || box.style.display === '') {
            box.style.display = 'block';
            label.innerText = '－ 收起客製備註';
        } else {
            box.style.display = 'none';
            label.innerText = '＋ 填寫客製備註';
        }
    }

    function setFilter(f, btn) { filter = f; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); }

    function render() {
        const key = document.getElementById('searchInput').value.toLowerCase();
        let today = new Date().toISOString().slice(5, 10), count = 0;
        document.getElementById('tbody').innerHTML = orders.filter(o => (filter === 'all' || o.status === filter) && (o.doctor.toLowerCase().includes(key) || o.product.toLowerCase().includes(key))).map(o => {
            if(o.date.includes(today)) count++;
            
            // 修改點：保留 slice(0, 16) 輸出完整的「年-月-日 時:分」
            let displayTime = o.date ? o.date.replace('T', ' ').slice(0, 16) : '';
            
            return `<tr>
                <td>
                    <b>${o.doctor}</b> 
                    <small style="color:var(--sub); margin-left:8px;">${displayTime}</small>
                    <br>
                    <small>${o.product} (${o.note})</small>
                </td>
                <td align="right">
                    <span class="tag ${o.status === '已補貨' ? 'tag-done' : 'tag-not'}" onclick="toggle(${o.rowNum})">${o.status}</span>
                </td>
            </tr>`;
        }).join('');
        document.getElementById('dailyTotal').innerText = count + " 件";
    }

    function toggle(row) { fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "toggle", row: row }) }).then(() => location.reload()); }
    document.getElementById('orderForm').onsubmit = (e) => {
        e.preventDefault();
        const note = document.getElementById('sz').value + "/" + document.getElementById('sd').value + " | " + document.getElementById('noteBox').value;
        fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "add", doctor: document.getElementById('doctor').value, product: document.getElementById('product').value, qty: document.getElementById('qty').value, note: note }) }).then(() => location.reload());
    };
</script>
</body>
</html>
