<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>業務核心主控台(完全體)</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f5f7fa; padding: 10px; margin: 0; color: #333; }
        .card { background: white; padding: 16px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); max-width: 100%; margin: 0 auto 15px auto; }
        h2 { margin-top: 0; color: #111; text-align: center; font-size: 18px; border-bottom: 2px solid #f0f2f5; padding-bottom: 8px; margin-bottom: 12px; }
        h3 { font-size: 14px; margin-top: 12px; color: #555; margin-bottom: 6px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #444; font-size: 13px; }
        select, input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: #fafafa; -webkit-appearance: none; }
        
        /* 快捷按鈕組 */
        .btn-group { display: flex; gap: 6px; }
        .radio-btn { flex: 1; text-align: center; padding: 10px; background: #eee; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; border: 2px solid transparent; transition: 0.2s; }
        .radio-btn.active { background: #007aff; color: white; border-color: #0056b3; }
        
        button { width: 100%; background: #007aff; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        button:disabled { background: #ccc; }
        
        /* 名單管理清單 */
        .list-item { display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 6px 10px; border-radius: 6px; margin-bottom: 4px; font-size: 14px; }
        .del-btn { background: #ff3b30; color: white; border: none; padding: 3px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; width: auto; margin: 0; }
        .inline-form { display: flex; gap: 6px; margin-bottom: 10px; }
        .inline-form input { flex: 1; padding: 6px; font-size: 13px; }
        .inline-form button { width: auto; padding: 6px 12px; margin: 0; font-size: 13px; background: #34c759; }

        /* 卡片歷史看板 */
        .order-card { background: #f8f9fa; border: 1px solid #eee; border-radius: 10px; padding: 10px; margin-bottom: 10px; font-size: 13px; position: relative; }
        .order-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 6px; border-bottom: 1px dashed #ddd; padding-bottom: 4px; }
        .order-time { color: #888; font-size: 11px; }
        .order-body { line-height: 1.4; color: #444; }
        
        .status-btn { border: none; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; width: auto; margin-top: 8px; display: inline-block; text-align: center; }
        .status-not { background: #ffebeb; color: #ff3b30; border: 1px solid #ffbcbc; }
        .status-done { background: #e6f9ec; color: #34c759; border: 1px solid #a3e7b9; }
    </style>
</head>
<body>

<div class="card">
    <h2>📦 業務出貨登記系統</h2>
    <div id="loading" style="text-align: center; color: #888; padding: 15px; font-size: 14px;">正在同步雲端資料庫...</div>
    
    <form id="orderForm" style="display: none;">
        <div class="form-group">
            <label>醫生姓名</label>
            <select id="doctor" required></select>
        </div>

        <div class="form-group">
            <label>產品名稱</label>
            <select id="product" required></select>
        </div>

        <div class="form-group">
            <label>尺寸规格</label>
            <div class="btn-group" id="sizeGroup">
                <div class="radio-btn active" data-value="S">S</div>
                <div class="radio-btn" data-value="M">M</div>
                <div class="radio-btn" data-value="L">L</div>
                <div class="radio-btn" data-value="XL">XL</div>
            </div>
            <input type="hidden" id="size" value="S">
        </div>

        <div class="form-group">
            <label>肢側</label>
            <div class="btn-group" id="sideGroup">
                <div class="radio-btn active" data-value="左">左</div>
                <div class="radio-btn" data-value="右">右</div>
            </div>
            <input type="hidden" id="side" value="左">
        </div>

        <div class="form-group">
            <label>數量</label>
            <input type="number" id="quantity" value="1" min="1" required>
        </div>

        <div class="form-group">
            <label>備註 (其他特殊需求填這裡)</label>
            <textarea id="note" rows="2" placeholder="有其他特殊客製需求再填寫..."></textarea>
        </div>

        <button type="submit" id="submitBtn">確認送出紀錄</button>
    </form>
</div>

<div class="card" id="historySection" style="display: none;">
    <h2>📊 歷史出貨即時看板</h2>
    <div id="historyCardsContainer"></div>
</div>

<div class="card" id="mgmtSection" style="display: none;">
    <h2>🛠️ 雲端名單管理面板</h2>
    
    <h3>👨‍⚕️ 醫生名單管理</h3>
    <div class="inline-form">
        <input type="text" id="newDocName" placeholder="輸入新醫生姓名">
        <button onclick="addList('Doctor')">新增</button>
    </div>
    <div id="doctorMgmtList"></div>

    <h3>🦿 產品名單管理</h3>
    <div class="inline-form">
        <input type="text" id="newProdName" placeholder="輸入新產品名稱">
        <button onclick="addList('Product')">新增</button>
    </div>
    <div id="productMgmtList"></div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyaWWi76p0Ln3_pHVWLOuZFWN-12PhfsvXVSCgFO1wEkSLhgD1b-0Lwde7DAuN2pixK8g/exec";
    let globalData = {};

    // 尺寸按鈕點擊
    const sizeBtns = document.querySelectorAll('#sizeGroup .radio-btn');
    sizeBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            sizeBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('size').value = this.getAttribute('data-value');
        });
    });

    // 肢側按鈕點擊
    const sideBtns = document.querySelectorAll('#sideGroup .radio-btn');
    sideBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            sideBtns.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.getElementById('side').value = this.getAttribute('data-value');
        });
    });

    window.onload = init;
    
    function init() {
        document.getElementById('loading').style.display = 'block';
        fetch(GAS_URL)
        .then(res => res.json())
        .then(data => {
            globalData = data;
            renderAll();
        })
        .catch(err => {
            document.getElementById('loading').innerHTML = "❌ 連線失敗，請稍後重試。";
        });
    }

    function renderAll() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('orderForm').style.display = 'block';
        document.getElementById('mgmtSection').style.display = 'block';
        document.getElementById('historySection').style.display = 'block';

        // 1. 選單
        const docSelect = document.getElementById('doctor');
        const prodSelect = document.getElementById('product');
        docSelect.innerHTML = ""; prodSelect.innerHTML = "";
        globalData.doctors.forEach(d => docSelect.innerHTML += `<option value="${d}">${d}</option>`);
        globalData.products.forEach(p => prodSelect.innerHTML += `<option value="${p}">${p}</option>`);

        // 2. 名單
        const docMgmt = document.getElementById('doctorMgmtList');
        const prodMgmt = document.getElementById('productMgmtList');
        docMgmt.innerHTML = ""; prodMgmt.innerHTML = "";
        globalData.doctors.forEach(d => {
            docMgmt.innerHTML += `<div class="list-item"><span>${d}</span><button class="del-btn" onclick="deleteItem('Doctor', '${d}')">刪除</button></div>`;
        });
        globalData.products.forEach(p => {
            prodMgmt.innerHTML += `<div class="list-item"><span>${p}</span><button class="del-btn" onclick="deleteItem('Product', '${p}')">刪除</button></div>`;
        });

        // 3. 看板
        const container = document.getElementById('historyCardsContainer');
        container.innerHTML = "";
        if(!globalData.orders || globalData.orders.length === 0) {
            container.innerHTML = `<div style="text-align:center;color:#888;padding:10px;">暫無出貨紀錄</div>`;
            return;
        }
        globalData.orders.forEach(o => {
            const isDone = o.status === "已補貨";
            const btnClass = isDone ? "status-done" : "status-not";
            const nextStatus = isDone ? "未補貨" : "已補貨";
            
            container.innerHTML += `
                <div class="order-card">
                    <div class="order-header">
                        <span>${o.doctor} 醫師</span>
                        <span class="order-time">${o.date}</span>
                    </div>
                    <div class="order-body">
                        <div><strong>產品：</strong>${o.product} (數量: ${o.qty})</div>
                        <div><strong>細節：</strong>${o.note || '-'}</div>
                    </div>
                    <div style="text-align: right;">
                        <button class="status-btn ${btnClass}" onclick="toggleStatus(${o.rowNum}, '${nextStatus}')">
                            ${o.status} 🔄
                        </button>
                    </div>
                </div>
            `;
        });
    }

    // 表單送出
    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerHTML = "正在同步至雲端...";

        const sz = document.getElementById('size').value;
        const sd = document.getElementById('side').value;
        const userNote = document.getElementById('note').value.trim();
        
        // 規格與備註合併自動塞入
        const combinedNote = `【${sz} / ${sd}】${userNote}`;

        const formData = {
            action: "addOrder",
            doctor: document.getElementById('doctor').value,
            product: document.getElementById('product').value,
            quantity: document.getElementById('quantity').value,
            note: combinedNote
        };

        sendPost(formData, "🎉 出貨紀錄已成功同步！");
        document.getElementById('note').value = "";
    });

    function toggleStatus(rowNum, nextStatus) {
        const formData = { action: "toggleStatus", rowNum: rowNum, newStatus: nextStatus };
        sendPost(formData, `🔄 狀態已變更為【${nextStatus}】`);
    }

    function addList(type) {
        const input = document.getElementById(`new${type}Name`);
        const val = input.value.trim();
        if(!val) return alert("請輸入名稱");
        const data = { action: `add${type}`, name: val };
        input.value = "";
        sendPost(data, "🎉 已新增名單！");
    }

    // 刪除
    function deleteItem(type, name) {
        if(!confirm(`確定要刪除【${name}】嗎？`)) return;
        const data = { action: `delete${type}`, name: name };
        sendPost(data, "🗑️ 已成功刪除");
    }

    function sendPost(data, successMsg) {
        fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) })
        .then(res => res.json())
        .then(res => {
            if(res.status === "success") {
                alert(successMsg);
                init();
            } else { alert("❌ 處理失敗"); document.getElementById('submitBtn').disabled = false; }
        })
        .catch(err => { alert("❌ 連線錯誤"); document.getElementById('submitBtn').disabled = false; });
    }
</script>
</body>
</html>
