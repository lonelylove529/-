<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>業務出貨助手</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; padding: 20px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); max-width: 500px; margin: 0 auto; }
        h2 { margin-top: 0; color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        select, input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: #007aff; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="card">
    <h2>📦 業務出貨紀錄</h2>
    <div id="loading" style="text-align: center; color: #888;">正在從雲端載入最新醫生與產品名單...</div>
    
    <form id="orderForm" style="display: none;">
        <div class="form-group">
            <label>醫生姓名</label>
            <select id="doctor" required></select>
        </div>

        <div class="form-group">
            <label>產品名稱</label>
            <select id="product" required></select>
        </div>

        <div class="form-group">
            <label>尺寸</label>
            <select id="size" required>
                <option value="S">S</option>
                <option value="M">M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
            </select>
        </div>

        <div class="form-group">
            <label>肢側</label>
            <select id="side" required>
                <option value="左側">左側</option>
                <option value="右側">右側</option>
                <option value="雙側">雙側</option>
            </select>
        </div>

        <div class="form-group">
            <label>數量</label>
            <input type="number" id="quantity" value="1" min="1" required>
        </div>

        <div class="form-group">
            <label>備註</label>
            <textarea id="note" rows="2" placeholder="有其他特殊需求填這裡..."></textarea>
        </div>

        <button type="submit" id="submitBtn">確認送出紀錄</button>
    </form>
</div>

<script>
    // 🔗 已經幫你綁定好剛剛生成的 Google Apps Script 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxicKM2oAz3T49BLHf4FDty4ij9PWz9sH8ETL-591bXLjjaKQXFfiOprymrIc1tv71hgA/exec";

    window.onload = function() {
        fetch(GAS_URL)
        .then(response => response.json())
        .then(data => {
            const doctorSelect = document.getElementById('doctor');
            const productSelect = document.getElementById('product');
            
            // 清空預設
            doctorSelect.innerHTML = "";
            productSelect.innerHTML = "";

            if(data.doctors.length === 0) {
                let opt = document.createElement('option');
                opt.text = "⚠️ 請先去試算表『醫生名單』分頁加人";
                doctorSelect.appendChild(opt);
            } else {
                data.doctors.forEach(doc => {
                    let opt = document.createElement('option');
                    opt.value = doc;
                    opt.innerHTML = doc;
                    doctorSelect.appendChild(opt);
                });
            }
            
            if(data.products.length === 0) {
                let opt = document.createElement('option');
                opt.text = "⚠️ 請先去試算表『產品名單』分頁加產品";
                productSelect.appendChild(opt);
            } else {
                data.products.forEach(prod => {
                    let opt = document.createElement('option');
                    opt.value = prod;
                    opt.innerHTML = prod;
                    productSelect.appendChild(opt);
                });
            }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('orderForm').style.display = 'block';
        })
        .catch(err => {
            document.getElementById('loading').innerHTML = "❌ 載入失敗，請確認試算表分頁名稱是否為『醫生名單』與『產品名單』。";
            console.error(err);
        });
    };

    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = "正在寫入雲端試算表...";

        const formData = {
            doctor: document.getElementById('doctor').value,
            product: document.getElementById('product').value,
            size: document.getElementById('size').value,
            side: document.getElementById('side').value,
            quantity: document.getElementById('quantity').value,
            note: document.getElementById('note').value
        };

        fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify(formData)
        })
        .then(res => res.json())
        .then(res => {
            if(res.status === "success") {
                alert("🎉 寫入成功！試算表已同步更新！");
                document.getElementById('note').value = "";
            } else {
                alert("❌ 寫入失敗，請重試");
            }
        })
        .catch(err => {
            alert("❌ 連線錯誤：" + err);
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = "確認送出紀錄";
        });
    });
</script>
</body>
</html>
